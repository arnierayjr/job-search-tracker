<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracer — Your Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --amber: #D97B1A;
      --amber-dim: #BA7517;
      --amber-bg: rgba(217,123,26,0.10);
      --dark: #1A1410;
      --surface: #211C16;
      --muted: #8a7a66;
      --text: #EDE3D4;
      --text-secondary: #b5a890;
      --border: rgba(217,123,26,0.2);
      --border-focus: rgba(217,123,26,0.6);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
    .shell { padding: 40px 32px 52px; max-width: 540px; width: 100%; }
    .wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--amber); letter-spacing: 0.08em; margin-bottom: 40px; }
    .step-row { display: flex; gap: 8px; margin-bottom: 36px; }
    .step-dot { height: 3px; border-radius: 2px; flex: 1; background: var(--border); }
    .step-dot.active { background: var(--amber); }
    .eyebrow { font-size: 11px; letter-spacing: 0.18em; color: var(--amber); text-transform: uppercase; font-weight: 500; margin-bottom: 10px; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.03em; color: var(--text); line-height: 1.05; margin-bottom: 10px; }
    .subtitle { font-size: 14px; color: var(--text-secondary); font-weight: 300; margin-bottom: 36px; line-height: 1.6; }
    .field { margin-bottom: 22px; }
    label { display: block; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); font-weight: 500; margin-bottom: 8px; }
    input[type="text"] { width: 100%; background: var(--surface); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s; }
    input[type="text"]::placeholder { color: var(--muted); font-weight: 300; }
    input[type="text"]:focus { border-color: var(--border-focus); }
    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: var(--surface); border: 0.5px solid var(--border); border-radius: 100px; padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; }
    .chip:hover { border-color: var(--border-focus); color: var(--text); }
    .chip.selected { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); font-weight: 500; }
    .exp-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .exp-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .exp-card:hover { border-color: var(--border-focus); }
    .exp-card.selected { background: var(--amber-bg); border-color: var(--amber); }
    .exp-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--text); letter-spacing: 0.04em; line-height: 1; margin-bottom: 4px; transition: color 0.15s; }
    .exp-card.selected .exp-num { color: var(--amber); }
    .exp-label { font-size: 11px; color: var(--muted); }
    .exp-card.selected .exp-label { color: var(--amber); opacity: 0.8; }
    .divider { height: 1px; background: var(--border); margin: 28px 0; }
    .cta-row { display: flex; gap: 12px; align-items: center; }
    .btn-primary { background: var(--amber); color: #1A1410; border: none; border-radius: 8px; padding: 13px 28px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; flex: 1; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    .btn-primary:hover { background: var(--amber-dim); }
    .btn-back { background: transparent; color: var(--muted); border: 0.5px solid var(--border); border-radius: 8px; padding: 13px 18px; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: color 0.15s; text-decoration: none; display: flex; align-items: center; }
    .btn-back:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="shell">
    <div class="wordmark">JOB TRACER</div>

    <div class="step-row">
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
    </div>

    <p class="eyebrow">Your profile</p>
    <h1>Let's zero in on your search.</h1>
    <p class="subtitle">The more specific you are, the better Archer can tailor your materials — and the sharper your tracker stays.</p>

    <div class="field">
      <label>Target role</label>
      <input type="text" placeholder="e.g. IT Help Desk Technician, Customer Support Specialist" />
    </div>

    <div class="field">
      <label>Years of experience</label>
      <div class="exp-row">
        <div class="exp-card" onclick="selectExp(this)">
          <div class="exp-num">0–1</div>
          <div class="exp-label">Starting out</div>
        </div>
        <div class="exp-card" onclick="selectExp(this)">
          <div class="exp-num">2–4</div>
          <div class="exp-label">Early career</div>
        </div>
        <div class="exp-card selected" onclick="selectExp(this)">
          <div class="exp-num">5–9</div>
          <div class="exp-label">Mid-level</div>
        </div>
        <div class="exp-card" onclick="selectExp(this)">
          <div class="exp-num">10+</div>
          <div class="exp-label">Experienced</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Work type</label>
      <div class="chip-group">
        <div class="chip selected" onclick="toggleChip(this)">Remote</div>
        <div class="chip selected" onclick="toggleChip(this)">Hybrid</div>
        <div class="chip" onclick="toggleChip(this)">On-site</div>
      </div>
    </div>

    <div class="field">
      <label>Location</label>
      <input type="text" placeholder="e.g. Washington DC / Maryland area" />
    </div>

    <div class="divider"></div>

    <div class="cta-row">
      <a class="btn-back" href="philosophy.html">← Back</a>
      <a class="btn-primary" href="archer.html">Continue</a>
    </div>
  </div>

  <script>
    function selectExp(el) {
      document.querySelectorAll('.exp-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }
    function toggleChip(el) {
      el.classList.toggle('selected');
    }
  </script>
</body>
</html>
