<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracer — Sign In</title>
<script src="../data.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f9; --surface: #ffffff; --border: #e1e7f0;
    --blue: #3b7dd8; --blue-dark: #2563eb; --blue-light: #eff6ff;
    --text: #111827; --muted: #64748b;
    --red: #dc2626; --red-soft: rgba(220,38,38,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }
  .auth-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 420px;
    box-shadow: 0 4px 24px rgba(59,125,216,0.07);
    animation: fadeUp 0.5s ease both;
  }
  .logo {
    font-size: 1.4rem; font-weight: 700; letter-spacing: 0.04em;
    text-align: center; margin-bottom: 0.3rem; color: var(--text);
  }
  .logo span { color: var(--blue); }
  .logo-sub {
    font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em;
    text-align: center; margin-bottom: 2rem; text-transform: uppercase;
  }
  .tabs {
    display: flex; border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; margin-bottom: 1.75rem; background: var(--bg);
  }
  .tab {
    flex: 1; padding: 0.65rem; text-align: center;
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em;
    cursor: pointer; background: transparent; color: var(--muted);
    border: none; transition: all 0.15s; text-transform: uppercase;
  }
  .tab.active { background: var(--blue); color: #000; border-radius: 6px; }
  .field { margin-bottom: 1rem; }
  .field label {
    display: block; font-size: 0.7rem; font-weight: 600;
    color: var(--muted); margin-bottom: 0.4rem;
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .field input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.75rem 1rem; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
  .field input::placeholder { color: var(--muted); }
  .btn-submit {
    width: 100%; background: var(--blue); color: #000;
    border: none; border-radius: 6px; padding: 0.85rem;
    font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 700;
    letter-spacing: 0.04em; cursor: pointer; transition: background 0.15s;
    margin-top: 0.5rem; text-transform: uppercase;
  }
  .btn-submit:hover { background: var(--blue-dark); }
  .error-msg {
    display: none; background: var(--red-soft); border: 1px solid rgba(220,38,38,0.2);
    border-radius: 6px; padding: 0.75rem 1rem; margin-bottom: 1rem;
    font-size: 0.82rem; color: var(--red);
  }
  .divider {
    text-align: center; margin: 1.25rem 0 0;
    font-size: 0.78rem; color: var(--muted);
  }
  .divider a { color: var(--blue); text-decoration: none; cursor: pointer; font-weight: 500; }
  .divider a:hover { text-decoration: underline; }
  .back-link {
    display: block; text-align: center; margin-top: 1.5rem;
    font-size: 0.72rem; color: var(--muted); text-decoration: none;
  }
  .back-link:hover { color: var(--blue); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="auth-card">
  <div class="logo">JOB<span>TRACER</span></div>
  <div class="logo-sub">🏹 POWERED BY ARCHER</div>

  <div class="tabs">
    <button class="tab active" id="tabSignup" onclick="switchTab('signup')">CREATE ACCOUNT</button>
    <button class="tab" id="tabSignin" onclick="switchTab('signin')">SIGN IN</button>
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <!-- SIGN UP FORM -->
  <div id="signupForm">
    <div class="field">
      <label>Your Name</label>
      <input type="text" id="signupName" placeholder="First and last name" autocomplete="name" />
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="At least 8 characters" autocomplete="new-password" />
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="signupPasswordConfirm" placeholder="Re-enter your password" autocomplete="new-password" />
    </div>
    <button class="btn-submit" id="btnSignup" onclick="handleSignup()">CREATE MY ACCOUNT 🏹</button>
    <div class="divider">Already have an account? <a onclick="switchTab('signin')">Sign in</a></div>
  </div>

  <!-- SIGN IN FORM -->
  <div id="signinForm" style="display:none">
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="signinEmail" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signinPassword" placeholder="Your password" autocomplete="current-password" />
    </div>
    <button class="btn-submit" id="btnSignin" onclick="handleSignin()">SIGN IN →</button>
    <div class="divider">New here? <a onclick="switchTab('signup')">Create an account</a></div>
  </div>
</div>

<a href="/" class="back-link">← BACK TO JOBTRACER.APP</a>

<script>
  // If already signed in, go to dashboard
  (function() {
    const user = AUTH.getCurrentUser();
    if (user) window.location.href = '/app/dashboard/index.html';
  })();

  // Pre-fill email from URL param
  const params = new URLSearchParams(window.location.search);
  const preEmail = params.get('email') || '';
  const mode = params.get('mode') || 'signup';

  if (preEmail) {
    document.getElementById('signupEmail').value = preEmail;
    document.getElementById('signinEmail').value = preEmail;

    // If they have an existing account, switch to sign-in
    if (AUTH.hasAccount(preEmail) && mode !== 'signup') {
      switchTab('signin');
    }
  }

  if (mode === 'signin') switchTab('signin');

  function switchTab(tab) {
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('signinForm').style.display = tab === 'signin' ? 'block' : 'none';
    document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
    document.getElementById('tabSignin').classList.toggle('active', tab === 'signin');
    hideError();
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('errorMsg').style.display = 'none';
  }

  async function handleSignup() {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirm = document.getElementById('signupPasswordConfirm').value;

    if (!name) return showError('Please enter your name.');
    if (!email || !email.includes('@')) return showError('Please enter a valid email address.');
    if (!password || password.length < 8) return showError('Password must be at least 8 characters.');
    if (password !== confirm) return showError('Passwords do not match.');
    if (AUTH.hasAccount(email)) {
      showError('An account with that email already exists. Sign in instead.');
      return;
    }

    setLoading('btnSignup', true);
    await AUTH.register(email, name, password);
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
    DB.saveUser({ name, initials });
    window.location.href = '/app/onboarding/landing.html';
  }

  async function handleSignin() {
    const email = document.getElementById('signinEmail').value.trim();
    const password = document.getElementById('signinPassword').value;

    if (!email || !email.includes('@')) return showError('Please enter your email address.');
    if (!password) return showError('Please enter your password.');
    if (!AUTH.hasAccount(email)) {
      showError('No account found for that email. Create one instead.');
      return;
    }

    setLoading('btnSignin', true);
    const ok = await AUTH.verifyAndSignIn(email, password);
    if (!ok) {
      setLoading('btnSignin', false);
      return showError('Incorrect password. Please try again.');
    }
    window.location.href = '/app/dashboard/index.html';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.style.opacity = loading ? '0.6' : '1';
    btn.textContent = loading ? 'Please wait...' : (btnId === 'btnSignup' ? 'CREATE MY ACCOUNT 🏹' : 'SIGN IN →');
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const isSignup = document.getElementById('signupForm').style.display !== 'none';
      if (isSignup) handleSignup();
      else handleSignin();
    }
  });
</script>
</body>
</html>
