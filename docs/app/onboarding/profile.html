<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Tracer — Your Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f0f4f9; --surface: #ffffff; --border: #e1e7f0;
      --blue: #3b7dd8; --blue-dark: #2563eb; --blue-light: #eff6ff;
      --text: #111827; --muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; justify-content: center; }
    .shell { padding: 40px 32px 52px; max-width: 540px; width: 100%; }
    .wordmark { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: 0.04em; margin-bottom: 40px; }
    .wordmark span { color: var(--blue); }
    .step-row { display: flex; gap: 8px; margin-bottom: 36px; }
    .step-dot { height: 3px; border-radius: 2px; flex: 1; background: var(--border); }
    .step-dot.active { background: var(--blue); }
    .eyebrow { font-size: 11px; letter-spacing: 0.18em; color: var(--blue); text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
    h1 { font-size: 32px; font-weight: 700; color: var(--text); line-height: 1.2; margin-bottom: 10px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 36px; line-height: 1.6; }
    .field { margin-bottom: 22px; }
    label { display: block; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
    input[type="text"] { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-family: 'Inter', sans-serif; font-size: 14px; color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 8px 16px; font-family: 'Inter', sans-serif; font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.15s; }
    .chip:hover { border-color: var(--blue); color: var(--blue); }
    .chip.selected { background: var(--blue-light); border-color: var(--blue); color: var(--blue); font-weight: 600; }
    .exp-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .exp-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 10px; text-align: center; cursor: pointer; transition: all 0.15s; }
    .exp-card:hover { border-color: var(--blue); }
    .exp-card.selected { background: var(--blue-light); border-color: var(--blue); }
    .exp-num { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; margin-bottom: 4px; transition: color 0.15s; }
    .exp-card.selected .exp-num { color: var(--blue); }
    .exp-label { font-size: 11px; color: var(--muted); }
    .divider { height: 1px; background: var(--border); margin: 28px 0; }
    .cta-row { display: flex; gap: 12px; align-items: center; }
    .btn-primary { background: var(--blue); color: #000; border: none; border-radius: 8px; padding: 13px 28px; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.15s; flex: 1; text-decoration: none; display: flex; align-items: center; justify-content: center; }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-back { background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 8px; padding: 13px 18px; font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; transition: color 0.15s; text-decoration: none; display: flex; align-items: center; }
    .btn-back:hover { color: var(--text); border-color: var(--text); }
  </style>
</head>
<body>
  <div class="shell">
    <div class="wordmark">JOB<span>TRACER</span></div>

    <div class="step-row">
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot active"></div>
      <div class="step-dot"></div>
      <div class="step-dot"></div>
    </div>

    <p class="eyebrow">Your profile</p>
    <h1>Let's zero in on your search.</h1>
    <p class="subtitle">The more specific you are, the better Archer can tailor your materials — and the sharper your tracker stays.</p>

    <div class="field">
      <label>Target role</label>
      <input type="text" placeholder="e.g. IT Help Desk Technician, Customer Support Specialist" />
    </div>

    <div class="field">
      <label>Years of experience</label>
      <div class="exp-row">
        <div class="exp-card" onclick="selectExp(this)">
          <div class="exp-num">0–1</div>
          <div class="exp-label">Starting out</div>
        </div>
        <div class="exp-card" onclick="selectExp(this)">
          <div class="exp-num">2–4</div>
          <div class="exp-label">Early career</div>
        </div>
        <div class="exp-card selected" onclick="selectExp(this)">
          <div class="exp-num">5–9</div>
          <div class="exp-label">Mid-level</div>
        </div>
        <div class="exp-card" onclick="selectExp(this)">
          <div class="exp-num">10+</div>
          <div class="exp-label">Experienced</div>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Work type</label>
      <div class="chip-group">
        <div class="chip selected" onclick="toggleChip(this)">Remote</div>
        <div class="chip selected" onclick="toggleChip(this)">Hybrid</div>
        <div class="chip" onclick="toggleChip(this)">On-site</div>
      </div>
    </div>

    <div class="field">
      <label>Location</label>
      <input type="text" placeholder="e.g. Washington DC / Maryland area" />
    </div>

    <div class="divider"></div>

    <div class="cta-row">
      <a class="btn-back" href="philosophy.html">← Back</a>
      <a class="btn-primary" href="archer.html">Continue</a>
    </div>
  </div>

  <script>
    function selectExp(el) {
      document.querySelectorAll('.exp-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }
    function toggleChip(el) {
      el.classList.toggle('selected');
    }
  </script>
</body>
</html>
