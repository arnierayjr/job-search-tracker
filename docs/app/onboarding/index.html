<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Tracer — Meet Archer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111214;
    --card: #16181c;
    --border: #2a2d35;
    --amber: #f5a623;
    --amber-dim: #c47d0e;
    --amber-glow: rgba(245,166,35,0.15);
    --amber-soft: rgba(245,166,35,0.08);
    --white: #f0ede8;
    --muted: #7a7f8a;
    --green: #3ddc84;
    --green-glow: rgba(61,220,132,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.6;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 1.2rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.08em;
    color: var(--white);
  }

  .nav-logo span { color: var(--amber); }

  .nav-step {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .nav-step span { color: var(--amber); }

  /* MAIN LAYOUT */
  .onboarding-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6rem 2rem 4rem;
    position: relative;
  }

  /* Grid background */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black, transparent);
    pointer-events: none;
  }

  /* CHAT CONTAINER */
  .chat-container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 10;
  }

  /* ARCHER HEADER */
  .archer-header {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 2rem;
    animation: fadeUp 0.5s ease both;
  }

  .archer-avatar {
    width: 52px;
    height: 52px;
    background: var(--card);
    border: 2px solid var(--amber);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
    box-shadow: 0 0 20px var(--amber-glow);
    position: relative;
  }

  .archer-avatar::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(245,166,35,0.2);
    animation: ping 2s infinite;
  }

  @keyframes ping {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  .archer-info h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    color: var(--white);
  }

  .archer-info p {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    color: var(--amber);
    letter-spacing: 0.1em;
  }

  /* CHAT MESSAGES */
  .messages {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  /* Archer message */
  .msg-archer {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
    animation: fadeUp 0.4s ease both;
  }

  .msg-archer .bubble {
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: 0 12px 12px 12px;
    padding: 1rem 1.2rem;
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--white);
    max-width: 520px;
    position: relative;
  }

  .msg-archer .bubble strong { color: var(--amber); }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 1rem 1.2rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-left: 3px solid var(--amber);
    border-radius: 0 12px 12px 12px;
    width: fit-content;
  }

  .typing span {
    width: 6px; height: 6px;
    background: var(--amber);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* User message */
  .msg-user {
    display: flex;
    justify-content: flex-end;
    animation: fadeUp 0.4s ease both;
  }

  .msg-user .bubble {
    background: var(--amber-glow);
    border: 1px solid rgba(245,166,35,0.3);
    border-radius: 12px 0 12px 12px;
    padding: 0.8rem 1.2rem;
    font-size: 0.92rem;
    color: var(--white);
    max-width: 400px;
  }

  /* INPUT AREA */
  .input-area {
    animation: fadeUp 0.5s ease 0.2s both;
  }

  /* Option buttons */
  .options {
    display: flex;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 1rem;
  }

  .option-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 0.55rem 1.1rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .option-btn:hover, .option-btn.selected {
    border-color: var(--amber);
    color: var(--amber);
    background: var(--amber-soft);
  }

  /* Text input */
  .text-input-wrap {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .text-input-wrap:focus-within { border-color: var(--amber); }

  .text-input-wrap input {
    flex: 1;
    background: var(--card);
    border: none;
    outline: none;
    padding: 0.9rem 1.2rem;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
  }

  .text-input-wrap input::placeholder { color: var(--muted); }

  .text-input-wrap button {
    background: var(--amber);
    color: var(--black);
    border: none;
    padding: 0.9rem 1.4rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: background 0.2s;
  }

  .text-input-wrap button:hover { background: var(--amber-dim); }

  /* Upload area */
  .upload-area {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--card);
  }

  .upload-area:hover {
    border-color: var(--amber);
    background: var(--amber-soft);
  }

  .upload-area .upload-icon { font-size: 2rem; margin-bottom: 0.5rem; }

  .upload-area p {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .upload-area p span { color: var(--amber); cursor: pointer; }

  .upload-area input { display: none; }

  /* Skip button */
  .skip-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    margin-top: 0.75rem;
    display: block;
    text-align: center;
    width: 100%;
    transition: color 0.2s;
  }

  .skip-btn:hover { color: var(--white); }

  /* Progress bar */
  .progress-bar {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: var(--amber);
    transition: width 0.5s ease;
    z-index: 200;
    box-shadow: 0 0 8px var(--amber);
  }

  /* Success state */
  .success-screen {
    display: none;
    text-align: center;
    animation: fadeUp 0.6s ease both;
  }

  .success-screen .check {
    width: 80px; height: 80px;
    background: var(--green-glow);
    border: 2px solid var(--green);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    margin: 0 auto 1.5rem;
    box-shadow: 0 0 30px rgba(61,220,132,0.2);
  }

  .success-screen h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    letter-spacing: 0.05em;
    margin-bottom: 0.75rem;
  }

  .success-screen h2 span { color: var(--amber); }

  .success-screen p {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 400px;
    margin: 0 auto 2rem;
  }

  .cta-btn {
    display: inline-block;
    background: var(--amber);
    color: var(--black);
    border: none;
    padding: 0.9rem 2rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
  }

  .cta-btn:hover { background: var(--amber-dim); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hidden { display: none !important; }

  @media (max-width: 600px) {
    .options { flex-direction: column; }
    .option-btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar" style="width: 0%"></div>

<nav>
  <div class="nav-logo">JOB<span>TRACER</span></div>
  <div class="nav-step">STEP <span id="stepNum">1</span> OF 4</div>
</nav>

<div class="bg-grid"></div>

<div class="onboarding-wrap">
  <div class="chat-container">

    <!-- ARCHER HEADER -->
    <div class="archer-header">
      <div class="archer-avatar">🏹</div>
      <div class="archer-info">
        <h2>Archer</h2>
        <p>🟢 ONLINE — YOUR JOB SEARCH GUIDE</p>
      </div>
    </div>

    <!-- MESSAGES -->
    <div class="messages" id="messages"></div>

    <!-- INPUT AREA -->
    <div class="input-area" id="inputArea"></div>

    <!-- SUCCESS SCREEN -->
    <div class="success-screen" id="successScreen">
      <div class="check">✓</div>
      <h2>YOU'RE ALL SET, <span id="successName"></span>.</h2>
      <p>Archer has everything he needs to get started. Your job search journey is about to get a whole lot clearer.</p>
      <button class="cta-btn" onclick="goToDashboard()">GO TO MY DASHBOARD 🏹</button>
    </div>

  </div>
</div>

<script>
  const steps = [
    {
      id: 'name',
      archerMsg: `Hey — I'm <strong>Archer</strong>, your Job Tracer guide. 🏹<br><br>I'm here to help you trace your path, track your progress, and aim at the right opportunities. Before we get started, what's your name?`,
      inputType: 'text',
      placeholder: 'Type your first name...',
      btnText: 'NEXT'
    },
    {
      id: 'status',
      archerMsg: `Great to meet you, <strong>{name}</strong>. No pressure here — just you and me.<br><br>First things first. What best describes where you're at right now?`,
      inputType: 'options',
      options: [
        '🔍 Actively job hunting',
        '👀 Exploring opportunities',
        '💼 Employed but open to change',
        '🔄 Re-entering the workforce',
        '🎓 Recent grad starting out'
      ]
    },
    {
      id: 'roles',
      archerMsg: `Got it. Archer's locked in on that.<br><br>What kind of roles are you targeting? Pick everything that applies — the more I know, the better I can help you aim.`,
      inputType: 'options-multi',
      options: [
        '🖥️ IT / Help Desk / Tech Support',
        '📞 Customer Service',
        '⚙️ Operations / Admin',
        '📊 Data / Analytics',
        '🏗️ Project Management',
        '🧠 Other — I\'ll describe later'
      ]
    },
    {
      id: 'resume',
      archerMsg: `You're already ahead of most people just by being here.<br><br>Last thing — do you want to upload your resume? Archer can use it to personalize your cover letters and track your versions over time. No pressure if you're not ready yet.`,
      inputType: 'upload'
    }
  ];

  let currentStep = 0;
  let userData = {};
  let selectedOptions = [];

  function updateProgress() {
    const pct = ((currentStep) / steps.length) * 100;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('stepNum').textContent = currentStep + 1;
  }

  function addArcherMessage(msg) {
    return new Promise(resolve => {
      const messages = document.getElementById('messages');

      // Typing indicator
      const typingDiv = document.createElement('div');
      typingDiv.className = 'msg-archer';
      typingDiv.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
      messages.appendChild(typingDiv);
      messages.scrollTop = messages.scrollHeight;

      setTimeout(() => {
        typingDiv.remove();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg-archer';
        msgDiv.innerHTML = `<div class="bubble">${msg}</div>`;
        msgDiv.style.animationDelay = '0s';
        messages.appendChild(msgDiv);
        messages.scrollTop = messages.scrollHeight;
        resolve();
      }, 1200);
    });
  }

  function addUserMessage(msg) {
    const messages = document.getElementById('messages');
    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg-user';
    msgDiv.innerHTML = `<div class="bubble">${msg}</div>`;
    messages.appendChild(msgDiv);
    messages.scrollTop = messages.scrollHeight;
  }

  function renderInput(step) {
    const area = document.getElementById('inputArea');
    area.innerHTML = '';

    if (step.inputType === 'text') {
      area.innerHTML = `
        <div class="text-input-wrap">
          <input type="text" id="textInput" placeholder="${step.placeholder}" />
          <button onclick="submitText()">${step.btnText}</button>
        </div>
      `;
      setTimeout(() => document.getElementById('textInput').focus(), 100);
      document.getElementById('textInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') submitText();
      });

    } else if (step.inputType === 'options') {
      const btns = step.options.map(o =>
        `<button class="option-btn" onclick="selectOption(this, '${o}', false)">${o}</button>`
      ).join('');
      area.innerHTML = `<div class="options">${btns}</div>`;

    } else if (step.inputType === 'options-multi') {
      selectedOptions = [];
      const btns = step.options.map(o =>
        `<button class="option-btn" onclick="selectOption(this, '${o}', true)">${o}</button>`
      ).join('');
      area.innerHTML = `
        <div class="options">${btns}</div>
        <div class="text-input-wrap" style="margin-top:0.75rem">
          <input type="text" id="textInput" placeholder="Confirm selections above..." disabled style="opacity:0.5" />
          <button onclick="submitMulti()">NEXT</button>
        </div>
      `;

    } else if (step.inputType === 'upload') {
      area.innerHTML = `
        <div class="upload-area" onclick="document.getElementById('resumeInput').click()">
          <div class="upload-icon">📄</div>
          <p>Drop your resume here or <span>browse files</span></p>
          <p style="font-size:0.75rem;margin-top:0.4rem">PDF, DOC, DOCX supported</p>
          <input type="file" id="resumeInput" accept=".pdf,.doc,.docx" onchange="handleUpload(this)" />
        </div>
        <button class="skip-btn" onclick="skipUpload()">SKIP FOR NOW — I'LL ADD IT LATER</button>
      `;
    }
  }

  function submitText() {
    const val = document.getElementById('textInput').value.trim();
    if (!val) return;
    userData[steps[currentStep].id] = val;
    addUserMessage(val);
    document.getElementById('inputArea').innerHTML = '';
    nextStep();
  }

  function selectOption(btn, value, multi) {
    if (!multi) {
      document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      userData[steps[currentStep].id] = value;
      addUserMessage(value);
      document.getElementById('inputArea').innerHTML = '';
      setTimeout(() => nextStep(), 300);
    } else {
      btn.classList.toggle('selected');
      if (btn.classList.contains('selected')) {
        selectedOptions.push(value);
      } else {
        selectedOptions = selectedOptions.filter(o => o !== value);
      }
    }
  }

  function submitMulti() {
    if (selectedOptions.length === 0) return;
    userData[steps[currentStep].id] = selectedOptions;
    addUserMessage(selectedOptions.join(', '));
    document.getElementById('inputArea').innerHTML = '';
    nextStep();
  }

  function handleUpload(input) {
    const file = input.files[0];
    if (!file) return;
    userData.resume = file.name;
    addUserMessage(`📄 ${file.name} uploaded`);
    document.getElementById('inputArea').innerHTML = '';
    setTimeout(() => finishOnboarding(), 600);
  }

  function skipUpload() {
    userData.resume = null;
    addUserMessage("I'll add my resume later.");
    document.getElementById('inputArea').innerHTML = '';
    setTimeout(() => finishOnboarding(), 600);
  }

  async function nextStep() {
    currentStep++;
    updateProgress();

    if (currentStep >= steps.length) {
      finishOnboarding();
      return;
    }

    const step = steps[currentStep];
    let msg = step.archerMsg.replace('{name}', userData.name || 'there');
    await addArcherMessage(msg);
    renderInput(step);
  }

  async function finishOnboarding() {
    await addArcherMessage(`You're all set, <strong>${userData.name}</strong>. 🏹<br><br>Archer's got everything he needs. Let's go trace your path.`);
    document.getElementById('progressBar').style.width = '100%';
    document.getElementById('stepNum').textContent = '4';

    setTimeout(() => {
      document.getElementById('inputArea').classList.add('hidden');
      const success = document.getElementById('successScreen');
      document.getElementById('successName').textContent = (userData.name || 'friend').toUpperCase();
      success.style.display = 'block';
    }, 1500);
  }

  function goToDashboard() {
    alert("Dashboard coming soon! 🏹");
  }

  // INIT
  async function init() {
    updateProgress();
    await addArcherMessage(steps[0].archerMsg);
    renderInput(steps[0]);
  }

  init();
</script>

</body>
</html>
